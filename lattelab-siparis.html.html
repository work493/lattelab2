<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LatteLab — Sipariş</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #F5F0F0; --dark: #1A0A0A; --amber: #C0392B; }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--dark); padding-bottom: 120px; }
  
  /* Kategorileri sabitleyen kısım burası */
  .kategori-bar {
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    background: var(--cream);
    padding: 10px 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-left: 20px;
  }

  .kategori-buton {
    background: var(--dark);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    white-space: nowrap;
    cursor: pointer;
  }
  
  /* Geri kalan tasarımın buraya gelecek... */
</style>
</head>
<body>

<header>
  <h1>LatteLab Sipariş</h1>
</header>

<div class="kategori-bar">
  <div class="kategori-buton">Kahveler</div>
  <div class="kategori-buton">Tatlılar</div>
  <div class="kategori-buton">Soğuk İçecekler</div>
  <div class="kategori-buton">Atıştırmalıklar</div>
</div>

<div style="height: 1500px; padding: 20px;">
  <p>Sayfayı aşağı kaydırınca kategorilerin yukarıda sabit kaldığını göreceksin.</p>
</div>

</body>
</html>
